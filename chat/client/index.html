<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <title>Progetto Social - Chat</title>


    <style>

        body{
            background-color: rgba(222, 218, 218, 0.949);
        }

        h2{
            margin-top: 15px;
            color: #0d6efd;
            text-align: center;
            font-size: 40px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgb(48, 46, 46);
        }

        #messages{
            border: 2px solid rgb(23, 22, 22);
            box-shadow: 1px 1px 2px rgb(168, 161, 161);
            border-radius: 8px;
            width: 98%;
            margin: 0 auto;
            height: 580px;
            background-color: white;
            list-style: none;
        }

        #messages li{
           border: 1px solid black;
           border-radius: 10px;
           width: 85%;
           padding: 5px;
           margin-top: 5px;
           margin-bottom: 5px;
           background-color: rgb(242, 230, 230);
        }

        .message_friend{
            float: left;
            background-color: white;
        }

        .message_user{
            float: right;
            margin-right: 40px;
            background-color: rgb(121, 202, 125);
        }

         form{
            width: 98%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
        } 

        form input{
            height: 43px;
            width: 90%; 
            padding-left: 10px;
            border-radius: 5px;
        }

        @media(max-width:980px){
            form input{
                width: 84%;
            }
        }

        @media(max-width:600px){
            form input{
                width: 77%;
            }
        }

    </style>

  </head>

  <body>

   
    <h2>  <i class="fa fa-facebook-square" aria-hidden="true"></i>   Progetto Social - CHAT </h2>

    <ul id="messages"></ul>

    <form action="" class="fixed-bottom mb-2">
            <input id="text_message" type="text" autocomplete="off" /> 
            <button type="submit" class="btn btn-primary mb-2 px-4 fs-5">Invia</button>
    </form>







    <script>

      let socket = io();

      const form = document.querySelector("form");
      const input = document.querySelector("#text_message");
      const messages = document.querySelector("#messages");


      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (input.value) {
            let data = {
                id : 2,
                message : input.value
            }
          socket.emit("chat", data);
          input.value = "";
        }
      });


      socket.on("chat", (message) => {
        let li = document.createElement("li");
        li.append(message);
        messages.insertAdjacentElement("beforeend", li);
        window.scrollTo(0, document.body.scrollHeight);
      });

    </script>
  </body>
</html>
